version: "2.0-portable"

# These paths are now relative to the config file's location
directories:
  notebooks: "notebooks"
  personas: "personas"
  documents: "documents"
  data_dictionary: "data_dictionary"
  data: "data"

engine_settings:
  shield_mode: "JSON_ONLY"
  validation: "strict"
  package_mode: true

# The engine will now look for [persona_name].yaml inside the ./personas folder
personas:
  - architect
  - scientist
  - modeling_ds
  - tech_lead
  - strategic_lead

[project]
name = "kmds-data-dictionary-helper"
version = "0.1.0"
description = "AI-powered data dictionary generator for KMDS"
requires-python = ">=3.12"
dependencies = [
    "pymupdf4llm>=0.0.12",
    "ollama>=0.1.0",
    "pandas>=2.0.0",
    "dataprofiler[reports]<=0.13.4", # Lowered to match the actual latest release
    "setuptools<70.0.0",
    "urllib3<2.0.0",
    "rich>=13.0.0",
]

[project.scripts]
kmds-helper = "kmds_data_dictionary_helper.main:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
